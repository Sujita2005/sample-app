apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: hello-container
        image: us-east4-docker.pkg.dev/qwiklabs-gcp-00-a7e69565b8a6/my-repository/hello-cloudbuild:v1.0
